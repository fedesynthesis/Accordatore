<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Accordatore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#10131a;
    --bg2:#161b24;
    --card:#1c222e;
    --card-hi:#232b3a;
    --line:#2c3545;
    --ink:#eef1f6;
    --muted:#8b97ab;
    --faint:#5c677a;
    --brass:#c8a45c;
    --brass-dim:#7c6738;
    --in:#3ddc97;
    --up:#f5a623;
    --down:#5aa9ff;
    --hot:#ff5d5d;
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #1b2230 0%, transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:14px 14px 40px;
    max-width:560px;margin:0 auto;
  }

  header{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 16px}
  .brand{display:flex;align-items:baseline;gap:9px}
  .brand h1{
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:21px;
    letter-spacing:-.02em;margin:0;
  }
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--brass);box-shadow:0 0 12px var(--brass)}
  .brand small{color:var(--faint);font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-family:'Space Mono',monospace}

  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px;margin:0 -2px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;border:1px solid var(--line);background:var(--bg2);color:var(--muted);
    padding:8px 14px;border-radius:999px;font-size:13px;font-weight:500;white-space:nowrap;
    cursor:pointer;transition:.15s;font-family:'Space Grotesk',sans-serif;
  }
  .chip:hover{border-color:var(--brass-dim);color:var(--ink)}
  .chip.active{background:var(--brass);border-color:var(--brass);color:#1a1206;font-weight:600}

  .meter{
    background:linear-gradient(180deg,var(--card-hi),var(--card));
    border:1px solid var(--line);border-radius:22px;padding:22px 20px 18px;
    text-align:center;position:relative;overflow:hidden;margin-bottom:14px;
  }
  .meter .reading{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--faint);margin-bottom:4px}
  .note-main{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:78px;line-height:.9;
    letter-spacing:-.03em;transition:color .15s}
  .note-main sup{font-size:26px;color:var(--muted);font-weight:500;top:-1.2em}
  .note-main .acc{font-size:42px;color:var(--brass);vertical-align:super;margin-left:2px}
  .hz{font-family:'Space Mono',monospace;color:var(--muted);font-size:13px;margin-top:6px}

  .bar{position:relative;height:54px;margin:16px 4px 4px}
  .bar .track{position:absolute;top:50%;left:0;right:0;height:3px;background:var(--line);border-radius:3px;transform:translateY(-50%)}
  .bar .center{position:absolute;left:50%;top:8px;bottom:8px;width:2px;background:var(--faint);transform:translateX(-50%);opacity:.7}
  .bar .tick{position:absolute;top:50%;width:1px;height:9px;background:var(--line);transform:translateY(-50%)}
  .bar .marker{
    position:absolute;top:50%;left:50%;width:14px;height:14px;border-radius:50%;
    background:var(--muted);transform:translate(-50%,-50%);transition:left .09s linear,background .12s,box-shadow .12s;
    box-shadow:0 0 0 0 transparent;
  }
  .bar .labels{position:absolute;bottom:-2px;left:0;right:0;display:flex;justify-content:space-between;
    font-family:'Space Mono',monospace;font-size:10px;color:var(--faint)}
  .status{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;margin-top:10px;min-height:20px;letter-spacing:.01em}

  .mic-row{display:flex;gap:10px;margin-bottom:18px}
  .btn{
    flex:1;border:1px solid var(--line);background:var(--bg2);color:var(--ink);
    padding:13px;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s;
    font-family:'Space Grotesk',sans-serif;
  }
  .btn:hover{border-color:var(--brass-dim)}
  .btn.live{background:var(--in);border-color:var(--in);color:#06301d}
  .btn svg{width:17px;height:17px}
  .btn.ghost{flex:0 0 auto;color:var(--muted)}

  .hint{font-size:12px;color:var(--faint);text-align:center;margin:-8px 0 16px;line-height:1.5}

  .strings{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
  .peg{
    display:grid;grid-template-columns:30px 1fr auto;align-items:center;gap:14px;
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:12px 16px;cursor:pointer;transition:.15s;position:relative;overflow:hidden;
  }
  .peg:hover{background:var(--card-hi)}
  .peg.playing{border-color:var(--brass);background:var(--card-hi);box-shadow:inset 0 0 0 1px var(--brass-dim)}
  .peg.near{border-color:var(--in)}
  .peg .num{font-family:'Space Mono',monospace;font-size:12px;color:var(--faint);text-align:center}
  .peg .nm{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:22px;letter-spacing:-.01em}
  .peg .nm .acc{color:var(--brass);font-size:15px;vertical-align:super}
  .peg .meta{font-family:'Space Mono',monospace;font-size:11px;color:var(--faint);margin-top:1px}
  .peg .freq{font-family:'Space Mono',monospace;font-size:13px;color:var(--muted)}
  .wire{position:absolute;left:54px;right:90px;top:50%;height:2px;background:var(--brass-dim);
    border-radius:2px;opacity:0;transition:opacity .15s;pointer-events:none}
  .peg.playing .wire{opacity:.9;animation:vibe .12s linear infinite}
  @keyframes vibe{0%{transform:translateY(-2px)}50%{transform:translateY(2px)}100%{transform:translateY(-2px)}}

  .panel{background:var(--bg2);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:14px}
  .panel summary{list-style:none;cursor:pointer;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px}
  .panel summary::-webkit-details-marker{display:none}
  .panel summary .chev{transition:.2s;color:var(--muted)}
  .panel[open] summary .chev{transform:rotate(180deg)}
  .panel-body{padding:4px 16px 16px}
  .editor-row{display:grid;grid-template-columns:30px 1fr;align-items:center;gap:12px;padding:9px 0;border-top:1px solid var(--line)}
  .editor-row:first-child{border-top:none}
  .editor-row .lbl{font-family:'Space Mono',monospace;font-size:12px;color:var(--faint)}
  .notes{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
  .nbtn{border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:8px;
    padding:5px 7px;font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:pointer;min-width:30px;text-align:center}
  .nbtn.on{background:var(--brass);border-color:var(--brass);color:#1a1206;font-weight:600}
  .oct{display:inline-flex;align-items:center;gap:6px;margin-left:4px;font-family:'Space Mono',monospace;font-size:12px;color:var(--muted)}
  .oct button{width:24px;height:24px;border-radius:7px;border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;font-size:14px;line-height:1}
  .editor-actions{display:flex;gap:8px;margin-top:14px}
  .editor-actions .btn{padding:10px;font-size:13px}

  footer{text-align:center;color:var(--faint);font-size:11px;margin-top:6px;font-family:'Space Mono',monospace}
  @media (prefers-reduced-motion:reduce){.peg.playing .wire{animation:none}}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dot"></span>
    <h1>Accordatore</h1>
  </div>
  <small>6 corde</small>
</header>

<div class="chips" id="chips"></div>

<div class="meter">
  <div class="reading" id="reading">Corda selezionata</div>
  <div class="note-main" id="noteMain">—</div>
  <div class="hz" id="hzMain">—</div>
  <div class="bar">
    <div class="track"></div>
    <div class="center"></div>
    <div class="tick" style="left:12.5%"></div>
    <div class="tick" style="left:25%"></div>
    <div class="tick" style="left:37.5%"></div>
    <div class="tick" style="left:62.5%"></div>
    <div class="tick" style="left:75%"></div>
    <div class="tick" style="left:87.5%"></div>
    <div class="marker" id="marker"></div>
    <div class="labels"><span>-50</span><span>0</span><span>+50</span></div>
  </div>
  <div class="status" id="status">Tocca una corda per il tono di riferimento</div>
</div>

<div class="mic-row">
  <button class="btn" id="micBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1M12 19v3"/></svg>
    <span id="micLabel">Attiva microfono</span>
  </button>
  <button class="btn ghost" id="stopBtn" title="Ferma tono">Stop tono</button>
</div>
<div class="hint" id="hint">Col microfono pizzica una corda alla volta: ti mostro la nota e di quanto sei stonato.</div>

<div class="strings" id="strings"></div>

<details class="panel" id="customPanel">
  <summary>
    <span>Accordatura personalizzata</span>
    <span class="chev">▾</span>
  </summary>
  <div class="panel-body">
    <div id="editor"></div>
    <div class="editor-actions">
      <button class="btn" id="randomBtn">🎲 Note casuali</button>
      <button class="btn" id="resetCustom">↺ Da Standard</button>
    </div>
  </div>
</details>

<footer>Riferimento A4 = 440 Hz</footer>

<script>
const NOTES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FLAT  = {1:"Db",3:"Eb",6:"Gb",8:"Ab",10:"Bb"};

const TUNINGS = {
  "Standard":   [[4,2],[9,2],[2,3],[7,3],[11,3],[4,4]],
  "½ tono giù": [[3,2],[8,2],[1,3],[6,3],[10,3],[3,4]],
  "Drop D":     [[2,2],[9,2],[2,3],[7,3],[11,3],[4,4]],
  "Drop C#":    [[1,2],[8,2],[1,3],[6,3],[10,3],[3,4]],
  "Drop C":     [[0,2],[7,2],[0,3],[5,3],[9,3],[2,4]],
  "Drop B":     [[11,1],[6,2],[11,2],[4,3],[8,3],[1,4]],
  "DADGAD":     [[2,2],[9,2],[2,3],[7,3],[9,3],[2,4]],
  "Open G":     [[2,2],[7,2],[2,3],[7,3],[11,3],[2,4]],
  "Open D":     [[2,2],[9,2],[2,3],[6,3],[9,3],[2,4]],
  "Open E":     [[4,2],[11,2],[4,3],[8,3],[11,3],[4,4]],
  "Open C":     [[0,2],[7,2],[0,3],[7,3],[0,4],[4,4]],
  "Personalizzata": [[4,2],[9,2],[2,3],[7,3],[11,3],[4,4]],
};

const midiOf = (idx,oct)=>(oct+1)*12+idx;
const freqOf = (idx,oct)=>440*Math.pow(2,(midiOf(idx,oct)-69)/12);
function fmtNote(idx,oct){
  const acc = idx in FLAT ? `<span class="acc">${NOTES[idx][1]}</span>` : "";
  return `${NOTES[idx][0]}${acc}<sup>${oct}</sup>`;
}

let current = "Standard";
let strings = TUNINGS["Standard"].map(s=>[...s]);
let selected = 0;
let playing = -1;
let micOn = false;

/* ============ AUDIO: tono di riferimento (drone) ============ */
let actx, droneNodes=null, droneGain=null;
function ensureCtx(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==="suspended") actx.resume(); }
function stopDrone(){
  if(droneGain){
    const g=droneGain, t=actx.currentTime;
    g.gain.cancelScheduledValues(t); g.gain.setValueAtTime(g.gain.value,t); g.gain.linearRampToValueAtTime(0,t+0.08);
    const n=droneNodes; setTimeout(()=>{ n&&n.forEach(o=>{try{o.stop()}catch(e){}}); },120);
  }
  droneGain=null; droneNodes=null;
  if(playing>=0){ document.querySelectorAll(".peg")[playing]?.classList.remove("playing"); playing=-1; }
}
function playString(i){
  ensureCtx();
  if(playing===i){ stopDrone(); return; }
  stopDrone();
  const f=freqOf(strings[i][0],strings[i][1]);
  const lp=actx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=2400; lp.Q.value=0.6;
  const g=actx.createGain(); g.gain.value=0;
  lp.connect(g); g.connect(actx.destination);
  const partials=[[1,1],[2,0.42],[3,0.22],[4,0.10]];
  const nodes=[];
  partials.forEach(([mult,amp])=>{
    const o=actx.createOscillator(); o.type="sine"; o.frequency.value=f*mult;
    const og=actx.createGain(); og.gain.value=amp;
    o.connect(og); og.connect(lp); o.start(); nodes.push(o);
  });
  const t=actx.currentTime;
  g.gain.linearRampToValueAtTime(0.16,t+0.02);
  droneNodes=nodes; droneGain=g; playing=i;
  renderStrings(); updateMeterForSelected(i);
}

/* ============ AUDIO: microfono + autocorrelazione ============ */
let micStream=null, micSource=null, analyser=null, buf=null, rafTimer=null;
async function toggleMic(){
  if(micOn){ stopMic(); return; }
  try{
    ensureCtx();
    micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    await actx.resume();
    micSource=actx.createMediaStreamSource(micStream);
    analyser=actx.createAnalyser(); analyser.fftSize=2048;
    buf=new Float32Array(analyser.fftSize);
    micSource.connect(analyser);
    micOn=true;
    micBtn.classList.add("live"); micLabel.textContent="Microfono attivo";
    reading.textContent="Rilevato dal vivo";
    loopDetect();
  }catch(e){
    status.textContent="Microfono non disponibile qui";
    status.style.color="var(--hot)";
    hint.innerHTML="Il microfono può essere bloccato in anteprima. Funziona aprendo l'app a tutto schermo o ospitandola tu (es. GitHub Pages). Il tono di riferimento funziona sempre.";
  }
}
function stopMic(){
  micOn=false; clearTimeout(rafTimer);
  micStream&&micStream.getTracks().forEach(t=>t.stop()); micStream=null;
  micSource&&micSource.disconnect(); micSource=null; analyser=null;
  micBtn.classList.remove("live"); micLabel.textContent="Attiva microfono";
  document.querySelectorAll(".peg").forEach(p=>p.classList.remove("near"));
  updateMeterForSelected(selected);
}
function loopDetect(){
  if(!micOn) return;
  analyser.getFloatTimeDomainData(buf);
  const f=autoCorrelate(buf, actx.sampleRate);
  if(f>0) showDetected(f); else { status.textContent="Pizzica una corda…"; status.style.color="var(--muted)"; }
  rafTimer=setTimeout(loopDetect,55);
}
function autoCorrelate(b, rate){
  let SIZE=b.length, rms=0;
  for(let i=0;i<SIZE;i++){ rms+=b[i]*b[i]; }
  rms=Math.sqrt(rms/SIZE);
  if(rms<0.008) return -1;
  let r1=0,r2=SIZE-1,th=0.2;
  for(let i=0;i<SIZE/2;i++) if(Math.abs(b[i])<th){r1=i;break;}
  for(let i=1;i<SIZE/2;i++) if(Math.abs(b[SIZE-i])<th){r2=SIZE-i;break;}
  b=b.slice(r1,r2); SIZE=b.length;
  const c=new Float32Array(SIZE);
  for(let i=0;i<SIZE;i++) for(let j=0;j<SIZE-i;j++) c[i]+=b[j]*b[j+i];
  let d=0; while(d<SIZE-1 && c[d]>c[d+1]) d++;
  let max=-1,pos=-1;
  for(let i=d;i<SIZE;i++) if(c[i]>max){max=c[i];pos=i;}
  if(pos<=0) return -1;
  let x1=c[pos-1],x2=c[pos],x3=c[pos+1]||x2;
  let a=(x1+x3-2*x2)/2, bb=(x3-x1)/2;
  let T0=pos; if(a) T0=pos-bb/(2*a);
  const fr=rate/T0;
  return (fr>55 && fr<700)?fr:-1;
}
function showDetected(f){
  const midi=Math.round(69+12*Math.log2(f/440));
  const idx=((midi%12)+12)%12, oct=Math.floor(midi/12)-1;
  const target=440*Math.pow(2,(midi-69)/12);
  const cents=Math.round(1200*Math.log2(f/target));
  paintMeter(idx,oct,f,cents,true);
  let best=-1,bd=999;
  strings.forEach((s,i)=>{ const d=Math.abs(midiOf(s[0],s[1])-midi); if(d<bd){bd=d;best=i;} });
  document.querySelectorAll(".peg").forEach((p,i)=>p.classList.toggle("near", i===best && bd<=1));
}

/* ============ METER ============ */
function colorFor(cents){
  const a=Math.abs(cents);
  if(a<=5) return "var(--in)";
  if(a<=20) return cents<0?"var(--down)":"var(--up)";
  return "var(--hot)";
}
function paintMeter(idx,oct,f,cents,live){
  noteMain.innerHTML=fmtNote(idx,oct);
  const col=colorFor(cents);
  noteMain.style.color = live ? col : "var(--ink)";
  hzMain.textContent=`${f.toFixed(1)} Hz`;
  const clamped=Math.max(-50,Math.min(50,cents));
  marker.style.left=`${50+clamped}%`;
  marker.style.background=col;
  marker.style.boxShadow= Math.abs(cents)<=5 ? `0 0 14px ${col}` : "none";
  if(live){
    if(Math.abs(cents)<=5){ status.textContent="✓ Intonata"; status.style.color="var(--in)"; }
    else if(cents<0){ status.textContent="Alza ↑"; status.style.color="var(--up)"; }
    else{ status.textContent="Abbassa ↓"; status.style.color="var(--down)"; }
  }
}
function updateMeterForSelected(i){
  selected=i;
  const [idx,oct]=strings[i];
  reading.textContent= micOn ? "Rilevato dal vivo" : `Corda ${6-i} · riferimento`;
  if(!micOn){
    noteMain.innerHTML=fmtNote(idx,oct); noteMain.style.color="var(--ink)";
    hzMain.textContent=`${freqOf(idx,oct).toFixed(1)} Hz`;
    marker.style.left="50%"; marker.style.background="var(--muted)"; marker.style.boxShadow="none";
    status.textContent = playing===i ? "Tono in riproduzione…" : "Tono di riferimento pronto";
    status.style.color = playing===i ? "var(--brass)" : "var(--muted)";
  }
}

/* ============ RENDER ============ */
function renderChips(){
  chips.innerHTML="";
  Object.keys(TUNINGS).forEach(name=>{
    const c=document.createElement("button");
    c.className="chip"+(name===current?" active":"");
    c.textContent=name;
    c.onclick=()=>{ setTuning(name); };
    chips.appendChild(c);
  });
}
function renderStrings(){
  strings_el.innerHTML="";
  strings.forEach((s,i)=>{
    const [idx,oct]=s;
    const peg=document.createElement("div");
    peg.className="peg"+(playing===i?" playing":"");
    peg.innerHTML=`
      <div class="num">${6-i}</div>
      <div>
        <div class="nm">${NOTES[idx][0]}${idx in FLAT?`<span class="acc">${NOTES[idx][1]}</span>`:""}<sup style="font-size:.55em;color:var(--faint)">${oct}</sup></div>
        <div class="meta">${idx in FLAT?FLAT[idx]+oct+" · ":""}corda ${6-i}</div>
      </div>
      <div class="freq">${freqOf(idx,oct).toFixed(1)} Hz</div>
      <div class="wire"></div>`;
    peg.onclick=()=>{ updateMeterForSelected(i); playString(i); };
    strings_el.appendChild(peg);
  });
}
function renderEditor(){
  editor.innerHTML="";
  strings.forEach((s,i)=>{
    const row=document.createElement("div"); row.className="editor-row";
    const notesWrap=document.createElement("div"); notesWrap.className="notes";
    NOTES.forEach((n,ni)=>{
      const b=document.createElement("button");
      b.className="nbtn"+(s[0]===ni?" on":""); b.textContent=n;
      b.onclick=()=>{ s[0]=ni; current="Personalizzata"; TUNINGS["Personalizzata"]=strings.map(x=>[...x]); refreshAll(); };
      notesWrap.appendChild(b);
    });
    const oct=document.createElement("span"); oct.className="oct";
    oct.innerHTML=`<button data-d="-1">−</button>ott ${s[1]}<button data-d="1">+</button>`;
    oct.querySelectorAll("button").forEach(btn=>btn.onclick=()=>{
      s[1]=Math.max(0,Math.min(6,s[1]+(+btn.dataset.d)));
      current="Personalizzata"; TUNINGS["Personalizzata"]=strings.map(x=>[...x]); refreshAll();
    });
    notesWrap.appendChild(oct);
    row.innerHTML=`<div class="lbl">${6-i}ª</div>`;
    row.appendChild(notesWrap);
    editor.appendChild(row);
  });
}
function refreshAll(){ renderChips(); renderStrings(); renderEditor(); updateMeterForSelected(selected); }

function setTuning(name){
  current=name;
  strings=TUNINGS[name].map(s=>[...s]);
  stopDrone(); selected=0;
  if(name==="Personalizzata") customPanel.open=true;
  refreshAll();
}

/* ============ EVENTI ============ */
const strings_el=document.getElementById("strings");
const chips=document.getElementById("chips");
const editor=document.getElementById("editor");
const noteMain=document.getElementById("noteMain");
const hzMain=document.getElementById("hzMain");
const marker=document.getElementById("marker");
const status=document.getElementById("status");
const reading=document.getElementById("reading");
const micBtn=document.getElementById("micBtn");
const micLabel=document.getElementById("micLabel");
const hint=document.getElementById("hint");
const customPanel=document.getElementById("customPanel");

micBtn.onclick=toggleMic;
